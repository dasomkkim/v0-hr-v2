  <rect x="980" y="184" width="370" height="250" rx="16" fill="#F7FAFF" stroke="#D6E2F4"/>
  <line x1="1014" y1="394" x2="1322" y2="394" stroke="#CBD8ED"/>
  <line x1="1014" y1="218" x2="1014" y2="394" stroke="#CBD8ED"/>
  <polyline points="1020,384 1060,354 1100,334 1142,312 1180,286 1222,270 1260,238 1304,220" stroke="url(#line)" stroke-width="4" fill="none"/>
  <g fill="#38BDF8">
    <circle cx="1060" cy="354" r="5"/><circle cx="1142" cy="312" r="5"/><circle cx="1222" cy="270" r="5"/><circle cx="1304" cy="220" r="5"/>
  </g>

  <rect x="940" y="494" width="450" height="360" rx="24" fill="#FFFFFF" stroke="#C7D7EE" filter="url(#ds)"/>
  <text x="980" y="544" fill="#0F172A" font-family="Pretendard, Inter, sans-serif" font-size="18" font-weight="700">Executive Summary</text>
  <rect x="980" y="566" width="370" height="1" fill="#D6E2F4"/>
  <text x="980" y="594" fill="#475569" font-family="Pretendard, Inter, sans-serif" font-size="13">ASTRA AI는 전통적 면접 대비 더 높은 재현성과 예측 타당도를 보였습니다.</text>
  <text x="980" y="616" fill="#475569" font-family="Pretendard, Inter, sans-serif" font-size="13">편향 점검 지표에서도 성별/연령 그룹 간 통계적 불균형이 유의하게 감소했습니다.</text>
  <text x="980" y="638" fill="#475569" font-family="Pretendard, Inter, sans-serif" font-size="13">도입 후 채용 실패 비용은 평균 31% 절감, 평가 리드타임은 3초로 단축되었습니다.</text>
  <text x="980" y="660" fill="#475569" font-family="Pretendard, Inter, sans-serif" font-size="13">권장사항: 분기별 모델 재학습과 면접관 캘리브레이션 세션을 병행하십시오.</text>
  <rect x="980" y="696" width="164" height="44" rx="12" fill="#EAF3FF" stroke="#B9D3FF"/>
