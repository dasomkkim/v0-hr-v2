<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF3FF"/>
      <stop offset="1" stop-color="#E4ECFA"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/><stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="ds"><feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.15"/></filter>
  </defs>
  <rect width="1440" height="900" rx="32" fill="url(#bg)"/>
  <rect x="50" y="34" width="1340" height="58" rx="16" fill="#FFFFFF" stroke="#C4D4ED"/>
  <text x="86" y="70" fill="#0F172A" font-family="Pretendard, Inter, sans-serif" font-size="20" font-weight="700">ASTRA Whitepaper Viewer</text>

  <rect x="50" y="114" width="860" height="740" rx="24" fill="#FFFFFF" stroke="#C7D7EE" filter="url(#ds)"/>
  <text x="96" y="170" fill="#0EA5E9" font-family="Pretendard, Inter, sans-serif" font-size="12" font-weight="700">VALIDITY STUDY</text>
  <text x="96" y="220" fill="#0F172A" font-family="Pretendard, Inter, sans-serif" font-size="38" font-weight="800">다차원 AI 역량 모델링의 예측 타당도 검증</text>
  <text x="96" y="250" fill="#475569" font-family="Pretendard, Inter, sans-serif" font-size="16">Schmidt &amp; Hunter 이론의 현대적 재해석</text>
  <text x="96" y="286" fill="#64748B" font-family="Pretendard, Inter, sans-serif" font-size="13">ASTRA Research Team • 2026.02.14 • 15 min read</text>

  <rect x="96" y="314" width="768" height="190" rx="16" fill="#F7FAFF" stroke="#D4E0F2"/>
  <text x="124" y="350" fill="#64748B" font-family="Pretendard, Inter, sans-serif" font-size="12">Key Finding</text>
  <text x="124" y="420" fill="#0EA5E9" font-family="Pretendard, Inter, sans-serif" font-size="68" font-weight="800">r = 0.65</text>
  <text x="380" y="402" fill="#334155" font-family="Pretendard, Inter, sans-serif" font-size="20" font-weight="700">Human Intuition 0.38 vs ASTRA AI 0.65</text>
  <text x="380" y="432" fill="#64748B" font-family="Pretendard, Inter, sans-serif" font-size="14">약 2.1배 높은 고성과자 예측 정확도</text>

  <rect x="96" y="526" width="768" height="300" rx="16" fill="#F9FBFF" stroke="#D6E2F4"/>
  <text x="124" y="566" fill="#0F172A" font-family="Pretendard, Inter, sans-serif" font-size="18" font-weight="700">Methodology</text>
  <text x="124" y="598" fill="#334155" font-family="Pretendard, Inter, sans-serif" font-size="15">1. Data Source: 3.5 Million cumulative assessments</text>
  <text x="124" y="632" fill="#334155" font-family="Pretendard, Inter, sans-serif" font-size="15">2. Framework: O*NET based Competency Dictionary</text>
  <text x="124" y="666" fill="#334155" font-family="Pretendard, Inter, sans-serif" font-size="15">3. Technique: NLP + Behavioral Signal multi-modal analysis</text>
  <rect x="124" y="700" width="708" height="1" fill="#D6E2F4"/>
  <text x="124" y="728" fill="#475569" font-family="Pretendard, Inter, sans-serif" font-size="14">분석 결과, 지원자의 행동 시뮬레이션 점수는 입사 후 KPI와 유의한 양의 상관을 보였습니다.</text>
  <text x="124" y="750" fill="#475569" font-family="Pretendard, Inter, sans-serif" font-size="14">특히 문제해결력과 실행 지속성 항목이 성과 예측 기여도 상위 요인으로 확인되었습니다.</text>
  <text x="124" y="772" fill="#475569" font-family="Pretendard, Inter, sans-serif" font-size="14">모델 일반화 검증에서 산업군 간 편차는 허용 범위 내로 유지되었습니다.</text>

  <rect x="940" y="114" width="450" height="360" rx="24" fill="#FFFFFF" stroke="#C7D7EE" filter="url(#ds)"/>
