  <text x="114" y="638" fill="#475569" font-family="Pretendard, Inter, sans-serif" font-size="13">지원자는 문제 정의 단계에서 이해관계자 의견을 구조화해 우선순위를 도출하는 경향이 뚜렷합니다.</text>
  <text x="114" y="660" fill="#475569" font-family="Pretendard, Inter, sans-serif" font-size="13">답변의 일관성 점수는 0.89로 높으며, 실제 실행 경험을 근거로 판단을 제시하는 비율이 우수합니다.</text>
  <text x="114" y="682" fill="#475569" font-family="Pretendard, Inter, sans-serif" font-size="13">협업 상황에서 책임 회피보다 역할 조정과 재실행 계획을 제안하는 패턴이 반복적으로 관측되었습니다.</text>
